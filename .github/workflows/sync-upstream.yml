name: Sync with Upstream

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:       # Manual trigger

# Grant write access so we can push to origin
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for rebase
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/NousResearch/hermes-agent.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Update upstream branch
        run: |
          # Force the local 'upstream' branch to match upstream/main exactly
          git branch -f upstream upstream/main
          # Push the upstream branch to origin (tracking latest upstream main)
          git push origin upstream --force-with-lease

      - name: Rebase main onto upstream
        run: |
          git checkout main
          # Rebase our commits on main onto the latest upstream/main
          git rebase upstream/main

      - name: Push rebased main
        run: |
          # Push the rebased main back to origin
          git push origin main --force-with-lease
